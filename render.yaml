# ── Managed Postgres (auto-provisioned by the Blueprint) ──────────────────────
databases:
  - name: datamapper-db
    plan: basic-256mb      # smallest paid tier; bump to basic-1gb for heavier use
    region: singapore

services:
  - type: web
    name: datamapper-ai-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    # 'free' sleeps and is ~512MB — use 'standard' (≥2GB) before onboarding a
    # client; CrewAI + LLM SDKs + pandas will OOM on free/starter.
    plan: standard
    region: singapore
    branch: feature/enterprise-platform

    envVars:
      # ── Production hardening ──────────────────────────────────────────────
      - key: DM_ENV
        value: production        # enables auth enforcement + HSTS/CSP + JSON logs
      - key: XREF_REQUIRE_AUTH
        value: "true"            # every /api/* route needs a valid token
      - key: XREF_SECRET_KEY
        generateValue: true      # Render auto-generates a strong random value
      - key: DM_ENCRYPTION_KEY
        sync: false              # REQUIRED — paste a Fernet key (see deploy notes)
      - key: XREF_ADMIN_EMAIL
        sync: false              # bootstrap admin email (your login)
      - key: XREF_ADMIN_PASSWORD
        sync: false              # bootstrap admin password (no default in prod)
      - key: DM_ALLOWED_ORIGINS
        sync: false              # set to your Render URL once known, e.g. https://datamapper-ai-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:            # auto-wired from the managed Postgres above
          name: datamapper-db
          property: connectionString
      # ── LLM provider (Anthropic by default) ──────────────────────────────
      - key: DM_PROVIDER
        value: claude
      - key: DM_CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: ANTHROPIC_API_KEY
        sync: false          # REQUIRED — set in Render dashboard
      # Optional OpenAI-compatible fallback (set DM_PROVIDER to switch):
      - key: LLM_API_KEY
        sync: false          # optional
      - key: LLM_BASE_URL
        sync: false          # optional
      - key: SLACK_WEBHOOK_URL
        sync: false          # optional — set in Render dashboard
      - key: BQ_PROJECT_ID
        sync: false          # optional
      - key: BQ_DATASET
        sync: false          # optional
      # ── Billing (optional — Stripe) ───────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false          # optional — enables online checkout
      - key: STRIPE_WEBHOOK_SECRET
        sync: false          # optional — webhook signature verification
      - key: STRIPE_PRICE_STANDARD
        sync: false          # optional — Stripe price id for Standard
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false          # optional — Stripe price id for Enterprise
      - key: PORT
        value: "7788"

    healthCheckPath: /api/health
