services:
  - type: web
    name: datamapper-ai-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    # 'free' sleeps and is ~512MB — use 'standard' (≥2GB) before onboarding a
    # client; CrewAI + LLM SDKs + pandas will OOM on free/starter.
    plan: standard
    region: singapore
    branch: dev

    envVars:
      # ── Production hardening ──────────────────────────────────────────────
      - key: DM_ENV
        value: production        # enables auth enforcement + HSTS/CSP + JSON logs
      - key: XREF_REQUIRE_AUTH
        value: "true"            # every /api/* route needs a valid token
      - key: XREF_SECRET_KEY
        sync: false              # REQUIRED — strong random value, set in dashboard
      - key: XREF_ADMIN_EMAIL
        sync: false              # bootstrap admin email
      - key: XREF_ADMIN_PASSWORD
        sync: false              # bootstrap admin password (no default in prod)
      - key: DM_ALLOWED_ORIGINS
        sync: false              # e.g. https://app.yourdomain.com (pin, don't use *)
      - key: DATABASE_URL
        sync: false              # Postgres — required for durable multi-instance state
      # ── LLM provider ─────────────────────────────────────────────────────
      - key: DM_PROVIDER
        value: deepseek
      - key: LLM_MODEL
        value: deepseek-chat
      - key: LLM_BASE_URL
        value: https://api.deepseek.com/v1
      - key: LLM_API_KEY
        sync: false          # set manually in Render dashboard
      - key: SLACK_WEBHOOK_URL
        sync: false          # optional — set in Render dashboard
      - key: BQ_PROJECT_ID
        sync: false          # optional
      - key: BQ_DATASET
        sync: false          # optional
      - key: PORT
        value: "7788"

    healthCheckPath: /api/health
