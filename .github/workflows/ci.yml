name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint (ruff)
        # Blocking — ruff.toml curates the ruleset (correctness rules error;
        # intentional style rules ignored).
        run: ruff check app tests

      - name: Run tests
        env:
          DM_ENV: dev
        run: pytest -q

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image (verifies Dockerfile + app.main import)
        run: docker build -t dmapper:ci .
