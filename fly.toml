# DataMapper AI — Fly.io config
# Deploy: fly launch --config fly.toml
# Free tier: shared-cpu-1x, 256MB RAM

app = "datamapper-ai"
primary_region = "maa"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "7788"

[http_service]
  internal_port = 7788
  force_https = true
  auto_stop_machines = false   # keep always-on (free tier)
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
