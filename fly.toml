# DataMapper AI — Fly.io config
# Deploy: fly launch --config fly.toml
# Free tier: shared-cpu-1x, 256MB RAM

app = "datamapper-ai"
primary_region = "maa"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "7788"
  DM_ENV = "production"          # enables auth enforcement + HSTS/CSP + JSON logs
  XREF_REQUIRE_AUTH = "true"
  # Secrets (XREF_SECRET_KEY, XREF_ADMIN_PASSWORD, LLM_API_KEY, DATABASE_URL,
  # DM_ALLOWED_ORIGINS) must be set via `fly secrets set ...` — never commit them.

[http_service]
  internal_port = 7788
  force_https = true
  auto_stop_machines = false   # keep always-on (free tier)
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"   # CrewAI + LLM SDKs + pandas need headroom; 256mb will OOM
