# ── Production compose (VPS / GCP Compute Engine) ────────────────────────────
# Differences from docker-compose.yml (dev):
#   • Postgres & Redis are NOT published to the host — only reachable inside the
#     compose network (publishing 5432/6379 on a public VPS is how DBs get pwned).
#   • Caddy terminates HTTPS on 80/443 with automatic Let's Encrypt certificates
#     and reverse-proxies to the app. Set SITE_ADDRESS in .env to your domain
#     (e.g. SITE_ADDRESS=dmapper.example.com); leave unset to serve plain HTTP
#     on :80 while testing by IP.
#   • The app itself has no host port — all traffic goes through Caddy.
#
# Run with:  docker compose -f docker-compose.prod.yml up -d --build
services:
  datamapper:
    build: .
    container_name: xref-datamapper
    env_file: [.env]
    environment:
      - DATABASE_URL=postgresql+psycopg2://xref:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/xref
      - REDIS_URL=redis://redis:6379/0
      # Pin the port: a stray PORT=... in .env must not move the app away from
      # where Caddy and the healthcheck expect it.
      - PORT=7788
    volumes:
      - ./runtime:/app/runtime
      - ./audits:/app/audits
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7788/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  celery_worker:
    build: .
    container_name: xref-celery
    command: celery -A app.worker worker --loglevel=info --concurrency=2 -Q xref_pipeline
    env_file: [.env]
    environment:
      - DATABASE_URL=postgresql+psycopg2://xref:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/xref
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./runtime:/app/runtime
    depends_on: [redis, postgres]
    restart: unless-stopped
    # The Dockerfile's HTTP healthcheck doesn't apply to a Celery worker —
    # disable it so this container doesn't read 'unhealthy' forever.
    healthcheck:
      disable: true

  postgres:
    image: postgres:16-alpine
    container_name: xref-postgres
    environment:
      POSTGRES_DB: xref
      POSTGRES_USER: xref
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xref"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # NOTE: no `ports:` — internal-only on purpose.

  redis:
    image: redis:7-alpine
    container_name: xref-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # NOTE: no `ports:` — internal-only on purpose.

  caddy:
    image: caddy:2-alpine
    container_name: xref-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-:80}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [datamapper]
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
